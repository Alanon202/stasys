name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.7.3)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Determine tag
      id: tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi

    - uses: actions/checkout@v4
      with:
        ref: ${{ steps.tag.outputs.tag }}

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libudev-dev libinput-dev libdbus-1-dev pkg-config

    - name: Build release
      run: cargo build --release --locked

    - name: Create release archive
      run: |
        mkdir -p release
        cp target/release/stasys release/
        cd release
        TAG_NAME="${{ steps.tag.outputs.tag }}"
        tar czvf stasys-${TAG_NAME}-x86_64-unknown-linux-gnu.tar.gz stasys
        sha256sum stasys-${TAG_NAME}-x86_64-unknown-linux-gnu.tar.gz > stasys-${TAG_NAME}-x86_64-unknown-linux-gnu.tar.gz.sha256

    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/stasys-${{ steps.tag.outputs.tag }}-x86_64-unknown-linux-gnu.tar.gz
          release/stasys-${{ steps.tag.outputs.tag }}-x86_64-unknown-linux-gnu.tar.gz.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
