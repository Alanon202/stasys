name: Build Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libudev-dev libinput-dev libdbus-1-dev pkg-config
    
    - name: Build release
      run: cargo build --release --locked
    
    - name: Create release archive
      run: |
        mkdir -p release
        cp target/release/stasys release/
        cd release
        tar czvf stasys-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz stasys
        sha256sum stasys-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz > stasys-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256
    
    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/stasys-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          release/stasys-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
